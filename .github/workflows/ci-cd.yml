name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug build context
        run: |
          pwd
          ls -la
          ls -la backend
          test -f backend/package.json
          test -f backend/package-lock.json
          test -f backend/Dockerfile

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        run: docker build --file backend/Dockerfile --tag mern-chat-backend:ci --progress=plain .

      - name: Build Frontend
        run: docker build --file frontend/Dockerfile --tag mern-chat-frontend:ci --progress=plain .
