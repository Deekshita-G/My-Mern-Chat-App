name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug backend files
        run: ls -R backend

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        run: docker build --no-cache -t backend ./backend

      - name: Build Frontend
        run: docker build --no-cache -t frontend ./frontend